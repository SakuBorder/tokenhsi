# Configuration for 4 basic skills state transition training
env:
  numEnvs: 4096
  envSpacing: 5
  episodeLength: 600  # 20s for transition
  enableDebugVis: False
  
  pdControl: True
  powerScale: 1.0
  controlFrequencyInv: 2
  stateInit: "Random"  # Random initialization from skill states
  hybridInitProb: 0.8
  numAMPObsSteps: 10

  localRootObs: True
  localRootObsPolicy: False
  rootHeightObs: False
  rootHeightObsPolicy: False
  keyBodies: ["right_hand", "left_hand", "right_foot", "left_foot"]
  contactBodies: ["right_foot", "left_foot"]
  terminationHeight: 0.15
  enableEarlyTermination: True

  enableSelfCollisionDetection: True
  
  # State transition specific configuration
  enableStateTransition: True
  transitionMode: "pairwise"  # pairwise transitions between skills
  
  # Skills for transition training
  skill: [
    "loco", 
    "loco_sit", "sit",
    "loco_carry", "omomo", "pickUp", "carryWith", "putDown", 
    "loco_climb", "climb", "climbNoRSI"
  ]
  
  # Probability distribution for skill sampling during transition
  skillDiscProb: [
    0.1,
    0.1, 0.2,
    0.1, 0.1, 0.05, 0.0, 0.05,
    0.1, 0.1, 0.1,
  ]
  
  # State transition pairs (from_skill_id, to_skill_id)
  transitionPairs: [
    [0, 1], [0, 2], [0, 3],  # traj -> sit, carry, climb
    [1, 0], [1, 2], [1, 3],  # sit -> traj, carry, climb
    [2, 0], [2, 1], [2, 3],  # carry -> traj, sit, climb
    [3, 0], [3, 1], [3, 2]   # climb -> traj, sit, carry
  ]
  
  # Transition timing configuration
  transitionStartTime: 5.0    # Start transition after 5s
  transitionDuration: 10.0    # 10s for smooth transition
  transitionEndTime: 15.0     # Complete transition by 15s
  
  # Task configuration for transitions
  enableTaskObs: True
  enableTaskMaskObs: True
  enableApplyMaskOnTaskObs: True
  supportedTasks: ["traj", "sit", "carry", "climb"]

  # Multi-task reward weighting during transition
  transitionRewardWeights:
    source_skill: 0.3    # Weight for source skill maintenance
    target_skill: 0.5    # Weight for target skill achievement
    transition_smooth: 0.2  # Weight for smooth transition

  # Power reward
  power_reward: True
  power_coefficient: 0.0005

  asset:
    assetRoot: "tokenhsi/data/assets"
    assetFileName: "mjcf/phys_humanoid_v3.xml"

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 0.0

sim:
  substeps: 2
  physx:
    num_threads: 4
    solver_type: 1
    num_position_iterations: 4
    num_velocity_iterations: 0
    contact_offset: 0.02
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 10.0